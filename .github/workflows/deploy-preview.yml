name: Deploy Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # ← was: npm install -g pnpm (wrong)
        with:
          version: 10

      - name: Setup Node.js # ← moved AFTER pnpm install
        uses: actions/setup-node@v4
        with:
          node-version: 22 # ← was: 20 (inconsistent with ci.yml)
          cache: "pnpm" # ← was missing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25.2.0 # ← use this, v41.1.4 tag has resolution issues
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
